# ========================================
# 开发环境配置
# ========================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fruit_ecommerce?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 2

# 开发环境日志级别
logging:
  level:
    com.fruit: debug
    com.fruit.mapper: debug

# MyBatis Plus SQL日志（仅开发环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置（开发环境使用默认值）
jwt:
  secret: FruitEcommerceSecretKey2024DevEnvironment
  expiration: 604800000
