# ========================================
# 生产环境配置
# ========================================
# 注意：生产环境敏感信息应通过环境变量或外部配置中心提供
# 启动命令示例：
# java -jar app.jar \
#   --spring.profiles.active=prod \
#   --DB_URL=jdbc:mysql://prod-db:3306/fruit_ecommerce \
#   --DB_USERNAME=prod_user \
#   --DB_PASSWORD=secure_password \
#   --REDIS_HOST=prod-redis \
#   --REDIS_PASSWORD=secure_redis_password \
#   --JWT_SECRET=your-secure-jwt-secret-key-at-least-32-chars

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}
    database: ${REDIS_DATABASE:0}

# 生产环境日志级别
logging:
  level:
    com.fruit: info
    com.fruit.mapper: warn
  file:
    name: logs/fruit-ecommerce.log

# MyBatis Plus 生产环境关闭SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT配置（必须通过环境变量提供）
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

# 生产环境关闭API文档
knife4j:
  enable: false
