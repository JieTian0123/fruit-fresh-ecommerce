<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">热销榜单活动图</title>
  <desc id="desc">平台热销生鲜排行榜</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset=".52" stop-color="#ffedd5"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#7c2d12" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="614" cy="80" r="58" fill="#fdba74" opacity=".45"/>
  <circle cx="96" cy="326" r="62" fill="#bbf7d0" opacity=".55"/>
  <g transform="translate(360 88)" filter="url(#shadow)">
    <rect x="0" y="24" width="240" height="228" rx="24" fill="#ffffff"/>
    <rect x="34" y="68" width="52" height="140" rx="16" fill="#f97316"/>
    <rect x="98" y="40" width="52" height="168" rx="16" fill="#10b981"/>
    <rect x="162" y="94" width="52" height="114" rx="16" fill="#facc15"/>
    <text x="60" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#fff">2</text>
    <text x="124" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#fff">1</text>
    <text x="188" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#fff">3</text>
    <circle cx="60" cy="44" r="22" fill="#fb7185"/>
    <circle cx="124" cy="20" r="24" fill="#f97316"/>
    <circle cx="188" cy="70" r="20" fill="#84cc16"/>
  </g>
  <g>
    <text x="72" y="112" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="32" font-weight="800" fill="#7c2d12">热销榜单</text>
    <text x="72" y="154" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#57534e">平台高销量 · 大家都在买</text>
    <rect x="72" y="184" width="118" height="34" rx="17" fill="#ffffff" opacity=".86"/>
    <text x="131" y="207" text-anchor="middle" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" font-weight="800" fill="#ea580c">人气热卖</text>
  </g>
